version: 2

project_name: mnemonic

builds:
  - main: ./cmd/mnemonic
    binary: mnemonic
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/marioser/mnemonic/cmd/mnemonic/commands.Version={{.Version}}
      - -X github.com/marioser/mnemonic/cmd/mnemonic/commands.Commit={{.ShortCommit}}
      - -X github.com/marioser/mnemonic/cmd/mnemonic/commands.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    files:
      - plugin/**/*
      - config/default.yaml
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
